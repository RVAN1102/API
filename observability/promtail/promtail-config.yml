server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect logs from all Docker containers
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: (?P<container_name>(?:[^|]*[^ |]))
          source: tag
      - timestamp:
          format: RFC3339Nano
          source: time
      - labels:
          stream:
          container_name:
      - output:
          source: output

  # Specific labels for API services
  - job_name: user-service
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [".*user-service.*"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - target_label: service
        replacement: user-service
    pipeline_stages:
      - json:
          expressions:
            level: level
            event_type: event_type
            correlation_id: correlation_id
      - labels:
          level:
          event_type:

  - job_name: order-service
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [".*order-service.*"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - target_label: service
        replacement: order-service
    pipeline_stages:
      - json:
          expressions:
            level: level
            event_type: event_type
      - labels:
          level:
          event_type:

  - job_name: billing-service
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [".*billing-service.*"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - target_label: service
        replacement: billing-service
    pipeline_stages:
      - json:
          expressions:
            level: level
            event_type: event_type
            security_event: security_event
      - labels:
          level:
          event_type:

  - job_name: admin-service
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [".*admin-service.*"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - target_label: service
        replacement: admin-service
    pipeline_stages:
      - json:
          expressions:
            level: level
            event_type: event_type
            security_event: security_event
      - labels:
          level:
          event_type:
