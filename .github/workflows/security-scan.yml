name: Security Scan

on:
  push:
    branches:
      - "feat/tv3-devsecops-observability-redteam"
      - "setup/project-contracts"
      - "main"
  pull_request:
    branches:
      - "setup/project-contracts"
      - "main"

permissions:
  contents: read
  id-token: write

jobs:
  bandit:
    name: Bandit – Python Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Bandit
        run: pip install bandit==1.8.0

      - name: Run Bandit on services
        run: |
          set +e
          bandit -r services/ \
            --exclude services/*/test_*.py \
            --severity-level high \
            --confidence-level medium \
            --format txt \
            --output bandit-report.txt
          BANDIT_EXIT=$?
          cat bandit-report.txt
          exit ${BANDIT_EXIT}

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
        if: always()

  gitleaks:
    name: Gitleaks – Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks CLI
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            zricethezav/gitleaks:latest detect \
              --source=/repo \
              --redact \
              --verbose

  trivy:
    name: Trivy – Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          output: trivy-report.txt

      - name: Show Trivy report
        run: cat trivy-report.txt || true

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
        if: always()

  image-sbom-cosign:
    name: Image SBOM + Cosign Readiness
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user
          - order
          - billing
          - admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local service image
        run: |
          docker build \
            -t "topic10-${{ matrix.service }}-service:${{ github.sha }}" \
            "services/${{ matrix.service }}"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "topic10-${{ matrix.service }}-service:${{ github.sha }}"
          format: table
          # Image scan is kept as a production-oriented evidence/reporting gate.
          # Do not fail the prototype CI on upstream base-image CVEs without triage.
          exit-code: "0"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"
          output: "trivy-image-${{ matrix.service }}.txt"

      - name: Generate image CycloneDX SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: "topic10-${{ matrix.service }}-service:${{ github.sha }}"
          format: cyclonedx
          output: "image-sbom-${{ matrix.service }}.cdx.json"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign keyless readiness dry-run (no signature created)
        env:
          REPORT_DIR: ".artifacts/supply-chain-${{ matrix.service }}"
        run: |
          bash scripts/security/cosign-sign.sh dry-run \
            "ghcr.io/${{ github.repository }}/${{ matrix.service }}-service:${{ github.sha }}"

      - name: Upload image supply-chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: image-supply-chain-${{ matrix.service }}
          path: |
            trivy-image-${{ matrix.service }}.txt
            image-sbom-${{ matrix.service }}.cdx.json
            .artifacts/supply-chain-${{ matrix.service }}/
        if: always()
