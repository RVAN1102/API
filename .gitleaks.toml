  '''eyJhbGciOiJSUzI1NiJ9\.fake\.fake''',
  '''KEYCLOAK_REALM["']?,?\s*[:=]\s*["']?topic10-sme-api["']?''',
  '''keycloak_realm\s*=\s*["']topic10-sme-api["']''',
]

