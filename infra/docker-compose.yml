services:
  # ---------------------------------------------------------------------------
  # TV2 – OPA policy decision point
  # ---------------------------------------------------------------------------
  opa:
    image: openpolicyagent/opa:0.70.0
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    volumes:
      - ../opa/policies:/policies:ro
    expose:
      - "8181"
    ports:
      - "127.0.0.1:8181:8181"

  # ---------------------------------------------------------------------------
  # API Gateway (TV1) - Kong OSS in DB-less mode
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9
    depends_on:
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: notice
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_SSL_CIPHER_SUITE: "custom"
      KONG_SSL_PROTOCOLS: "TLSv1.3"
      KONG_NGINX_PROXY_SSL_PROTOCOLS: "TLSv1.3"
      KONG_NGINX_PROXY_SSL_CLIENT_CERTIFICATE: "/kong/certs/webhook-ca.crt"
      KONG_NGINX_PROXY_SSL_VERIFY_CLIENT: "optional"
    volumes:
      - ../gateway/kong.yml:/kong/declarative/kong.yml:ro
      - ../infra/certs:/kong/certs:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # TV2 – User Service
  # ---------------------------------------------------------------------------
  user-service:
    build:
      context: ../services/user
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: topic10-sme-api
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-http://localhost:8080/realms/topic10-sme-api}"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/users/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV2 – Order Service
  # ---------------------------------------------------------------------------
  order-service:
    build:
      context: ../services/order
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: topic10-sme-api
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-http://localhost:8080/realms/topic10-sme-api}"
      OPA_URL: "http://opa:8181"
    depends_on:
      - opa
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/orders/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – Billing Service
  # ---------------------------------------------------------------------------
  billing-service:
    build:
      context: ../services/billing
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      WEBHOOK_MAX_AGE_SECONDS: "300"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "topic10-sme-api"
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-http://localhost:8080/realms/topic10-sme-api}"
      BILLING_SERVICE_CLIENT_ID: "billing-service-client"
      BILLING_SERVICE_CLIENT_SECRET: "${BILLING_SERVICE_CLIENT_SECRET:?BILLING_SERVICE_CLIENT_SECRET is required}"
      ORDER_SERVICE_URL: "http://order-service:8000"
      OPA_URL: "http://opa:8181"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-dev-webhook-secret-change-me}"
    depends_on:
      - opa
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/billing/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – Admin Service
  # ---------------------------------------------------------------------------
  admin-service:
    build:
      context: ../services/admin
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "topic10-sme-api"
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-http://localhost:8080/realms/topic10-sme-api}"
      OPA_URL: "http://opa:8181"
    depends_on:
      - opa
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/admin/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV2 – Webhook demo receiver (kept from TV1 for HMAC demo scripts)
  # ---------------------------------------------------------------------------
  webhook-demo:
    image: python:3.13-alpine
    command: python /app/receiver.py
    environment:
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-dev-webhook-secret-change-me}"
      WEBHOOK_MAX_AGE_SECONDS: "300"
    volumes:
      - ../demo/webhook/receiver.py:/app/receiver.py:ro
    expose:
      - "8080"

  # ---------------------------------------------------------------------------
  # TV2 – Keycloak Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      BILLING_SERVICE_CLIENT_SECRET: "${BILLING_SERVICE_CLIENT_SECRET:?BILLING_SERVICE_CLIENT_SECRET is required}"
      ADMIN_SERVICE_CLIENT_SECRET: "${ADMIN_SERVICE_CLIENT_SECRET:?ADMIN_SERVICE_CLIENT_SECRET is required}"
    volumes:
      - ../idp/realm-export/topic10-realm.json:/opt/keycloak/data/import/topic10-sme-api-realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # TV2 – HashiCorp Vault (dev mode)
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.18
    command: server -dev -dev-root-token-id=dev-root-token
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – Loki (log aggregation)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ---------------------------------------------------------------------------
  # TV3 – Promtail (log collector – reads Docker container logs)
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.2.0
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  # ---------------------------------------------------------------------------
  # TV3 – Grafana (dashboard and alerting)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - loki

volumes:
  loki-data:
  grafana-data:
