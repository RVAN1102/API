services:
  # ---------------------------------------------------------------------------
  # TV2 – OPA policy decision point
  # ---------------------------------------------------------------------------
  opa:
    image: openpolicyagent/opa:0.70.0
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    volumes:
      - ../opa/policies:/policies:ro
    expose:
      - "8181"
    ports:
      - "127.0.0.1:8181:8181"
    networks:
      - default
      - order-policy-internal
      - billing-policy-internal
      - admin-policy-internal

  # ---------------------------------------------------------------------------
  # API Gateway (TV1) - Kong OSS in DB-less mode
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9
    depends_on:
      user-mtls-proxy:
        condition: service_started
      order-mtls-proxy:
        condition: service_started
      billing-mtls-proxy:
        condition: service_started
      admin-mtls-proxy:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: notice
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_SSL_CIPHER_SUITE: "custom"
      KONG_SSL_PROTOCOLS: "TLSv1.3"
      KONG_NGINX_PROXY_SSL_PROTOCOLS: "TLSv1.3"
      KONG_NGINX_PROXY_SSL_CLIENT_CERTIFICATE: "/kong/certs/webhook-ca.crt"
      KONG_NGINX_PROXY_SSL_VERIFY_CLIENT: "optional"
      KONG_NGINX_PROXY_PROXY_SSL_CERTIFICATE: /kong/gb-mtls/kong-client.crt
      KONG_NGINX_PROXY_PROXY_SSL_CERTIFICATE_KEY: /kong/gb-mtls/kong-client.key
      KONG_NGINX_PROXY_PROXY_SSL_TRUSTED_CERTIFICATE: /kong/gb-mtls/ca.crt
      KONG_NGINX_PROXY_PROXY_SSL_VERIFY: "on"
      KONG_NGINX_PROXY_PROXY_SSL_VERIFY_DEPTH: "2"
      KONG_NGINX_PROXY_PROXY_SSL_SERVER_NAME: "on"
      KONG_NGINX_PROXY_PROXY_SSL_PROTOCOLS: "TLSv1.3"
    volumes:
      - ../gateway/kong.yml:/kong/declarative/kong.yml:ro
      - ../infra/certs:/kong/certs:ro
      - ../infra/certs/gateway-backend:/kong/gb-mtls:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "127.0.0.1:8001:8001"
    networks:
      - default
      - kong-user-internal
      - kong-order-internal
      - kong-billing-internal
      - kong-admin-internal
      - kong-webhook-internal
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # TV1 – Gateway-to-Backend mTLS sidecars (default runtime)
  # ---------------------------------------------------------------------------
  user-mtls-proxy:
    image: nginx:1.27-alpine
    environment:
      MTLS_SERVER_NAME: user-mtls-proxy
      UPSTREAM_HOST: user-service
    volumes:
      - ../infra/nginx/gateway-backend-mtls.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../infra/certs/gateway-backend:/etc/nginx/certs:ro
    expose:
      - "8443"
    networks:
      - kong-user-internal
    depends_on:
      user-service:
        condition: service_healthy

  order-mtls-proxy:
    image: nginx:1.27-alpine
    environment:
      MTLS_SERVER_NAME: order-mtls-proxy
      UPSTREAM_HOST: order-service
    volumes:
      - ../infra/nginx/gateway-backend-mtls.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../infra/certs/gateway-backend:/etc/nginx/certs:ro
    expose:
      - "8443"
    networks:
      - kong-order-internal
    depends_on:
      order-service:
        condition: service_healthy

  billing-mtls-proxy:
    image: nginx:1.27-alpine
    environment:
      MTLS_SERVER_NAME: billing-mtls-proxy
      UPSTREAM_HOST: billing-service
    volumes:
      - ../infra/nginx/gateway-backend-mtls.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../infra/certs/gateway-backend:/etc/nginx/certs:ro
    expose:
      - "8443"
    networks:
      - kong-billing-internal
    depends_on:
      billing-service:
        condition: service_healthy

  admin-mtls-proxy:
    image: nginx:1.27-alpine
    environment:
      MTLS_SERVER_NAME: admin-mtls-proxy
      UPSTREAM_HOST: admin-service
    volumes:
      - ../infra/nginx/gateway-backend-mtls.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../infra/certs/gateway-backend:/etc/nginx/certs:ro
    expose:
      - "8443"
    networks:
      - kong-admin-internal
    depends_on:
      admin-service:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # TV2 – User Service
  # ---------------------------------------------------------------------------
  user-service:
    build:
      context: ../services/user
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: topic10-sme-api
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-http://localhost:8080/realms/topic10-sme-api}"
    networks:
      - kong-user-internal
      - user-identity-internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/users/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV2 – Order Service
  # ---------------------------------------------------------------------------
  order-service:
    build:
      context: ../services/order
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: topic10-sme-api
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-http://localhost:8080/realms/topic10-sme-api}"
      TOKEN_INTROSPECTION_ENABLED: "true"
      ORDER_TOKEN_INTROSPECTION_CLIENT_ID: "billing-service-client"
      ORDER_TOKEN_INTROSPECTION_CLIENT_SECRET: "${BILLING_SERVICE_CLIENT_SECRET:?BILLING_SERVICE_CLIENT_SECRET is required}"
      OPA_URL: "http://opa:8181"
    depends_on:
      - opa
    networks:
      - kong-order-internal
      - order-identity-internal
      - order-policy-internal
      - billing-order-s2s-internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/orders/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – Billing Service
  # ---------------------------------------------------------------------------
  billing-service:
    build:
      context: ../services/billing
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      WEBHOOK_MAX_AGE_SECONDS: "300"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "topic10-sme-api"
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-http://localhost:8080/realms/topic10-sme-api}"
      BILLING_SERVICE_CLIENT_ID: "billing-service-client"
      BILLING_SERVICE_CLIENT_SECRET: "${BILLING_SERVICE_CLIENT_SECRET:?BILLING_SERVICE_CLIENT_SECRET is required}"
      ORDER_SERVICE_URL: "http://order-service:8000"
      OPA_URL: "http://opa:8181"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-dev-webhook-secret-change-me}"
      WEBHOOK_NONCE_STORE: "${WEBHOOK_NONCE_STORE:-redis}"
      WEBHOOK_NONCE_REDIS_URL: "${WEBHOOK_NONCE_REDIS_URL:-redis://redis:6379/0}"
      WEBHOOK_NONCE_TTL_SECONDS: "${WEBHOOK_NONCE_TTL_SECONDS:-300}"
    depends_on:
      opa:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - kong-billing-internal
      - billing-identity-internal
      - billing-policy-internal
      - billing-order-s2s-internal
      - billing-nonce-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/billing/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Webhook replay nonce store – Redis-backed TTL store for lab regression
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    networks:
      - billing-nonce-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # TV3 – Admin Service
  # ---------------------------------------------------------------------------
  admin-service:
    build:
      context: ../services/admin
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "topic10-sme-api"
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-http://localhost:8080/realms/topic10-sme-api}"
      TOKEN_INTROSPECTION_ENABLED: "true"
      ADMIN_TOKEN_INTROSPECTION_CLIENT_ID: "admin-service-client"
      ADMIN_TOKEN_INTROSPECTION_CLIENT_SECRET: "${ADMIN_SERVICE_CLIENT_SECRET:?ADMIN_SERVICE_CLIENT_SECRET is required}"
      OPA_URL: "http://opa:8181"
    depends_on:
      - opa
    networks:
      - kong-admin-internal
      - admin-identity-internal
      - admin-policy-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/admin/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV2 – Webhook demo receiver (kept from TV1 for HMAC demo scripts)
  # ---------------------------------------------------------------------------
  webhook-demo:
    image: python:3.13-alpine
    command: python /app/receiver.py
    environment:
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-dev-webhook-secret-change-me}"
      WEBHOOK_MAX_AGE_SECONDS: "300"
    volumes:
      - ../demo/webhook/receiver.py:/app/receiver.py:ro
    networks:
      - kong-webhook-internal
    expose:
      - "8080"

  # ---------------------------------------------------------------------------
  # TV2 – Keycloak Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu

        template="/opt/keycloak/data/import-template/topic10-sme-api-realm.json"
        target="/opt/keycloak/data/import/topic10-sme-api-realm.json"

        mkdir -p "$$(dirname "$$target")"

        esc_billing=$$(printf '%s' "$$BILLING_SERVICE_CLIENT_SECRET" | sed 's/[\/&\\]/\\&/g')
        esc_admin=$$(printf '%s' "$$ADMIN_SERVICE_CLIENT_SECRET" | sed 's/[\/&\\]/\\&/g')

        sed \
          -e "s/[$$]{BILLING_SERVICE_CLIENT_SECRET}/$$esc_billing/g" \
          -e "s/[$$]{ADMIN_SERVICE_CLIENT_SECRET}/$$esc_admin/g" \
          "$$template" > "$$target"

        exec /opt/keycloak/bin/kc.sh start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      BILLING_SERVICE_CLIENT_SECRET: "${BILLING_SERVICE_CLIENT_SECRET:?BILLING_SERVICE_CLIENT_SECRET is required}"
      ADMIN_SERVICE_CLIENT_SECRET: "${ADMIN_SERVICE_CLIENT_SECRET:?ADMIN_SERVICE_CLIENT_SECRET is required}"
    volumes:
      - ../idp/realm-export/topic10-realm.json:/opt/keycloak/data/import-template/topic10-sme-api-realm.json:ro
    ports:
      - "8080:8080"
    networks:
      - default
      - user-identity-internal
      - order-identity-internal
      - billing-identity-internal
      - admin-identity-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # TV2 – HashiCorp Vault (dev mode)
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.18
    command: server -dev -dev-root-token-id=dev-root-token
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    networks:
      - default
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – Loki (log aggregation)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ../observability/alerts/loki-alert-rules.yml:/loki/rules/fake/loki-alert-rules.yml:ro
      - loki-data:/loki
    expose:
      - "3100"
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - default
      - observability-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ../observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    expose:
      - "9093"
    networks:
      - observability-internal

  # ---------------------------------------------------------------------------
  # TV3 – Promtail (log collector – reads Docker container logs)
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.2.0
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - observability-internal

  # ---------------------------------------------------------------------------
  # TV3 – Grafana (dashboard and alerting)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - loki
    networks:
      - default
      - observability-internal

  # ---------------------------------------------------------------------------
  # TV3 – Jaeger (distributed tracing backend + UI)
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - default
      - telemetry-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otel/otel-collector.yml"]
    volumes:
      - ../infra/otel/otel-collector.yml:/etc/otel/otel-collector.yml:ro
    depends_on:
      - jaeger
    expose:
      - "4317"
      - "4318"
    networks:
      - telemetry-internal

volumes:
  loki-data:
  grafana-data:

networks:
  default:
    name: infra_default
  kong-user-internal:
    internal: true
  kong-order-internal:
    internal: true
  kong-billing-internal:
    internal: true
  kong-admin-internal:
    internal: true
  kong-webhook-internal:
    internal: true
  user-identity-internal:
    internal: true
  order-identity-internal:
    internal: true
  billing-identity-internal:
    internal: true
  admin-identity-internal:
    internal: true
  order-policy-internal:
    internal: true
  billing-policy-internal:
    internal: true
  admin-policy-internal:
    internal: true
  billing-order-s2s-internal:
    internal: true
  billing-nonce-internal:
    internal: true
  observability-internal:
    internal: true
  telemetry-internal:
    internal: true
