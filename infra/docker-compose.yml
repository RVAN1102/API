x-readonly-runtime-hardening: &readonly_runtime_hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp

x-no-new-privileges-runtime-hardening: &no_new_privileges_runtime_hardening
  security_opt:
    - no-new-privileges:true

services:
  # ---------------------------------------------------------------------------
  # TV2 – OPA policy decision point
  # ---------------------------------------------------------------------------
  opa:
    <<: *readonly_runtime_hardening
    image: openpolicyagent/opa:0.70.0
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --tls-cert-file=/etc/internal-tls/opa.crt
      - --tls-private-key-file=/etc/internal-tls/opa.key
      - /policies
    volumes:
      - ../opa/policies:/policies:ro
      - ../infra/certs/gateway-backend:/etc/internal-tls:ro
    expose:
      - "8181"
    ports:
      - "127.0.0.1:8181:8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - default
      - order-policy-internal
      - billing-policy-internal
      - admin-policy-internal

  # ---------------------------------------------------------------------------
  # API Gateway (TV1) - Kong OSS in DB-less mode
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9
    depends_on:
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    environment:
      KONG_HEADERS: "off"
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8444 ssl"
      KONG_LOG_LEVEL: notice
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_SSL_CIPHER_SUITE: "custom"
      KONG_SSL_PROTOCOLS: "TLSv1.3"
      KONG_NGINX_PROXY_SSL_PROTOCOLS: "TLSv1.3"
      KONG_NGINX_PROXY_SSL_CLIENT_CERTIFICATE: "/kong/certs/webhook-ca.crt"
      KONG_NGINX_PROXY_SSL_VERIFY_CLIENT: "optional"
      KONG_NGINX_PROXY_PROXY_SSL_CERTIFICATE: /kong/gb-mtls/kong-client.crt
      KONG_NGINX_PROXY_PROXY_SSL_CERTIFICATE_KEY: /kong/gb-mtls/kong-client.key
      KONG_NGINX_PROXY_PROXY_SSL_TRUSTED_CERTIFICATE: /kong/gb-mtls/ca.crt
      KONG_NGINX_PROXY_PROXY_SSL_VERIFY: "on"
      KONG_NGINX_PROXY_PROXY_SSL_VERIFY_DEPTH: "2"
      KONG_NGINX_PROXY_PROXY_SSL_SERVER_NAME: "on"
      KONG_NGINX_PROXY_PROXY_SSL_PROTOCOLS: "TLSv1.3"
    volumes:
      - ../gateway/kong.yml:/kong/declarative/kong.yml:ro
      - ../infra/certs:/kong/certs:ro
      - ../infra/certs/gateway-backend:/kong/gb-mtls:ro
    ports:
      - "8443:8443"
      - "127.0.0.1:8445:8444"
    networks:
      - default
      - kong-user-internal
      - kong-order-internal
      - kong-billing-internal
      - kong-admin-internal
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # TV2 – User Service
  # ---------------------------------------------------------------------------
  user-service:
    <<: *readonly_runtime_hardening
    build:
      context: ../services/user
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_URL: https://keycloak:8443
      KEYCLOAK_REALM: topic10-sme-api
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-https://localhost:8446/realms/topic10-sme-api}"
      INTERNAL_TLS_CA_CERT: "/etc/internal-tls/ca.crt"
      SSL_CERT_FILE: "/etc/internal-tls/ca.crt"
      REQUESTS_CA_BUNDLE: "/etc/internal-tls/ca.crt"
    networks:
      - kong-user-internal
      - user-identity-internal
    expose:
      - "8443"
    volumes:
      - ../infra/certs/gateway-backend:/etc/internal-tls:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl,urllib.request; ctx=ssl.create_default_context(cafile='/etc/internal-tls/ca.crt'); ctx.load_cert_chain('/etc/internal-tls/kong-client.crt','/etc/internal-tls/kong-client.key'); urllib.request.urlopen('https://user-service:8443/api/v1/users/health',context=ctx,timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV2 – Order Service
  # ---------------------------------------------------------------------------
  order-service:
    <<: *readonly_runtime_hardening
    build:
      context: ../services/order
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_URL: https://keycloak:8443
      KEYCLOAK_REALM: topic10-sme-api
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-https://localhost:8446/realms/topic10-sme-api}"
      INTERNAL_TLS_CA_CERT: "/etc/internal-tls/ca.crt"
      SSL_CERT_FILE: "/etc/internal-tls/ca.crt"
      REQUESTS_CA_BUNDLE: "/etc/internal-tls/ca.crt"
      TOKEN_INTROSPECTION_ENABLED: "true"
      ORDER_TOKEN_INTROSPECTION_CLIENT_ID: "billing-service-client"
      ORDER_TOKEN_INTROSPECTION_CLIENT_SECRET: "${BILLING_SERVICE_CLIENT_SECRET:?BILLING_SERVICE_CLIENT_SECRET is required}"
      OPA_URL: "https://opa:8181"
    depends_on:
      - opa
    networks:
      - kong-order-internal
      - order-identity-internal
      - order-policy-internal
      - billing-order-mtls-internal
    expose:
      - "8443"
    volumes:
      - ../infra/certs/gateway-backend:/etc/internal-tls:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl,urllib.request; ctx=ssl.create_default_context(cafile='/etc/internal-tls/ca.crt'); ctx.load_cert_chain('/etc/internal-tls/kong-client.crt','/etc/internal-tls/kong-client.key'); urllib.request.urlopen('https://order-service:8443/api/v1/orders/health',context=ctx,timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – Billing Service
  # ---------------------------------------------------------------------------
  billing-service:
    <<: *readonly_runtime_hardening
    build:
      context: ../services/billing
      dockerfile: Dockerfile
    expose:
      - "8443"
    environment:
      WEBHOOK_MAX_AGE_SECONDS: "300"
      KEYCLOAK_URL: "https://keycloak:8443"
      KEYCLOAK_REALM: "topic10-sme-api"
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-https://localhost:8446/realms/topic10-sme-api}"
      INTERNAL_TLS_CA_CERT: "/etc/internal-tls/ca.crt"
      SSL_CERT_FILE: "/etc/internal-tls/ca.crt"
      REQUESTS_CA_BUNDLE: "/etc/internal-tls/ca.crt"
      BILLING_SERVICE_CLIENT_ID: "billing-service-client"
      BILLING_SERVICE_CLIENT_SECRET: "${BILLING_SERVICE_CLIENT_SECRET:?BILLING_SERVICE_CLIENT_SECRET is required}"
      ORDER_SERVICE_URL: "https://order-service:8443"
      ORDER_SERVICE_TLS_CA_CERT: "/etc/internal-tls/ca.crt"
      ORDER_SERVICE_TLS_CLIENT_CERT: "/etc/internal-tls/billing-client.crt"
      ORDER_SERVICE_TLS_CLIENT_KEY: "/etc/internal-tls/billing-client.key"
      OPA_URL: "https://opa:8181"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}"
      WEBHOOK_NONCE_STORE: "${WEBHOOK_NONCE_STORE:-redis}"
      WEBHOOK_NONCE_REDIS_URL: "${WEBHOOK_NONCE_REDIS_URL:-rediss://redis:6379/0}"
      WEBHOOK_NONCE_TTL_SECONDS: "${WEBHOOK_NONCE_TTL_SECONDS:-300}"
    depends_on:
      opa:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - kong-billing-internal
      - billing-identity-internal
      - billing-policy-internal
      - billing-order-mtls-internal
      - billing-nonce-internal
    volumes:
      - ../infra/certs/gateway-backend:/etc/internal-tls:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl,urllib.request; ctx=ssl.create_default_context(cafile='/etc/internal-tls/ca.crt'); ctx.load_cert_chain('/etc/internal-tls/kong-client.crt','/etc/internal-tls/kong-client.key'); urllib.request.urlopen('https://billing-service:8443/api/v1/billing/health',context=ctx,timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Webhook replay nonce store – Redis-backed TTL store for lab regression
  # ---------------------------------------------------------------------------
  redis:
    <<: *no_new_privileges_runtime_hardening
    image: redis:7.4-alpine
    command:
      - redis-server
      - --port
      - "0"
      - --tls-port
      - "6379"
      - --tls-cert-file
      - /etc/internal-tls/redis.crt
      - --tls-key-file
      - /etc/internal-tls/redis.key
      - --tls-ca-cert-file
      - /etc/internal-tls/ca.crt
      - --tls-auth-clients
      - "no"
      - --save
      - ""
      - --appendonly
      - "no"
    expose:
      - "6379"
    volumes:
      - ../infra/certs/gateway-backend:/etc/internal-tls:ro
    networks:
      - billing-nonce-internal
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cacert", "/etc/internal-tls/ca.crt", "-h", "redis", "--sni", "redis", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # TV3 – Admin Service
  # ---------------------------------------------------------------------------
  admin-service:
    <<: *readonly_runtime_hardening
    build:
      context: ../services/admin
      dockerfile: Dockerfile
    expose:
      - "8443"
    environment:
      KEYCLOAK_URL: "https://keycloak:8443"
      KEYCLOAK_REALM: "topic10-sme-api"
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-https://localhost:8446/realms/topic10-sme-api}"
      INTERNAL_TLS_CA_CERT: "/etc/internal-tls/ca.crt"
      SSL_CERT_FILE: "/etc/internal-tls/ca.crt"
      REQUESTS_CA_BUNDLE: "/etc/internal-tls/ca.crt"
      TOKEN_INTROSPECTION_ENABLED: "true"
      ADMIN_TOKEN_INTROSPECTION_CLIENT_ID: "admin-service-client"
      ADMIN_TOKEN_INTROSPECTION_CLIENT_SECRET: "${ADMIN_SERVICE_CLIENT_SECRET:?ADMIN_SERVICE_CLIENT_SECRET is required}"
      OPA_URL: "https://opa:8181"
    depends_on:
      - opa
    networks:
      - kong-admin-internal
      - admin-identity-internal
      - admin-policy-internal
    volumes:
      - ../infra/certs/gateway-backend:/etc/internal-tls:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl,urllib.request; ctx=ssl.create_default_context(cafile='/etc/internal-tls/ca.crt'); ctx.load_cert_chain('/etc/internal-tls/kong-client.crt','/etc/internal-tls/kong-client.key'); urllib.request.urlopen('https://admin-service:8443/api/v1/admin/health',context=ctx,timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV2 – Keycloak Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu

        template="/opt/keycloak/data/import-template/topic10-sme-api-realm.json"
        target="/opt/keycloak/data/import/topic10-sme-api-realm.json"

        mkdir -p "$$(dirname "$$target")"

        esc_billing=$$(printf '%s' "$$BILLING_SERVICE_CLIENT_SECRET" | sed 's/[\/&\\]/\\&/g')
        esc_admin=$$(printf '%s' "$$ADMIN_SERVICE_CLIENT_SECRET" | sed 's/[\/&\\]/\\&/g')

        sed \
          -e "s/[$$]{BILLING_SERVICE_CLIENT_SECRET}/$$esc_billing/g" \
          -e "s/[$$]{ADMIN_SERVICE_CLIENT_SECRET}/$$esc_admin/g" \
          "$$template" > "$$target"

        exec /opt/keycloak/bin/kc.sh start --import-realm --http-enabled=false --https-port=8443 --https-certificate-file=/etc/internal-tls/keycloak.crt --https-certificate-key-file=/etc/internal-tls/keycloak.key --hostname=https://localhost:8446 --hostname-strict=false
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "false"
      KC_HOSTNAME: "https://localhost:8446"
      KC_HOSTNAME_STRICT: "false"
      BILLING_SERVICE_CLIENT_SECRET: "${BILLING_SERVICE_CLIENT_SECRET:?BILLING_SERVICE_CLIENT_SECRET is required}"
      ADMIN_SERVICE_CLIENT_SECRET: "${ADMIN_SERVICE_CLIENT_SECRET:?ADMIN_SERVICE_CLIENT_SECRET is required}"
    volumes:
      - ../idp/realm-export/topic10-realm.json:/opt/keycloak/data/import-template/topic10-sme-api-realm.json:ro
      - ../infra/certs/gateway-backend:/etc/internal-tls:ro
    ports:
      - "8446:8443"
    networks:
      - default
      - user-identity-internal
      - order-identity-internal
      - billing-identity-internal
      - admin-identity-internal
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash -c \"cat < /dev/null > /dev/tcp/127.0.0.1/8443\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # TV2 – HashiCorp Vault (persistent sealed lab server)
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.18
    command:
      - /bin/sh
      - -c
      - |
        cat >/tmp/vault.hcl <<'EOF'
        disable_mlock = true
        storage "file" { path = "/vault/file" }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = 0
          tls_cert_file = "/etc/internal-tls/vault.crt"
          tls_key_file = "/etc/internal-tls/vault.key"
        }
        api_addr = "https://vault:8200"
        EOF
        exec vault server -config=/tmp/vault.hcl
    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_CACERT: "/etc/internal-tls/ca.crt"
    volumes:
      - ../infra/certs/gateway-backend:/etc/internal-tls:ro
      - vault-data:/vault/file
    ports:
      - "8200:8200"
    networks:
      - default
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=https://vault:8200", "-ca-cert=/etc/internal-tls/ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – Loki (log aggregation)
  # ---------------------------------------------------------------------------
  loki:
    profiles: ["observability"]
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ../observability/alerts/loki-alert-rules.yml:/loki/rules/fake/loki-alert-rules.yml:ro
      - loki-data:/loki
    expose:
      - "3100"
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - default
      - observability-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  alertmanager:
    profiles: ["observability"]
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ../observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    expose:
      - "9093"
    networks:
      - observability-internal

  # ---------------------------------------------------------------------------
  # TV3 – Promtail (log collector – reads Docker container logs)
  # ---------------------------------------------------------------------------
  promtail:
    profiles: ["observability"]
    image: grafana/promtail:3.2.0
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - observability-internal

  # ---------------------------------------------------------------------------
  # TV3 – Grafana (dashboard and alerting)
  # ---------------------------------------------------------------------------
  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - loki
    networks:
      - default
      - observability-internal

  # ---------------------------------------------------------------------------
  # TV3 – Jaeger (distributed tracing backend + UI)
  # ---------------------------------------------------------------------------
  jaeger:
    profiles: ["observability"]
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - default
      - telemetry-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ---------------------------------------------------------------------------
  # TV3 – OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel-collector:
    profiles: ["observability"]
    <<: *readonly_runtime_hardening
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otel/otel-collector.yml"]
    volumes:
      - ../infra/otel/otel-collector.yml:/etc/otel/otel-collector.yml:ro
    depends_on:
      - jaeger
    expose:
      - "4317"
      - "4318"
    networks:
      - telemetry-internal

volumes:
  loki-data:
  grafana-data:

  vault-data:
networks:
  default:
    name: infra_default
  kong-user-internal:
    internal: true
  kong-order-internal:
    internal: true
  kong-billing-internal:
    internal: true
  kong-admin-internal:
    internal: true
  user-identity-internal:
    internal: true
  order-identity-internal:
    internal: true
  billing-identity-internal:
    internal: true
  admin-identity-internal:
    internal: true
  order-policy-internal:
    internal: true
  billing-policy-internal:
    internal: true
  admin-policy-internal:
    internal: true
  billing-order-mtls-internal:
    internal: true
  billing-nonce-internal:
    internal: true
  observability-internal:
    internal: true
  telemetry-internal:
    internal: true
