# zap-baseline rule configuration file
# see https://www.zaproxy.org/docs/docker/baseline-scan/

# Ignore some rules that are expected for this dev environment/prototype
10036	IGNORE	(Server Leaks Version Information via "Server" HTTP Response Header Field)
10049	IGNORE	(Non-Stapled OCSP responses)
10068	IGNORE	(Extracted Error Messages)
10098	IGNORE	(Cross-Domain Misconfiguration)

# We enforce HSTS on HTTPS but ZAP might scan the HTTP port
10035	WARN	(Strict-Transport-Security Header Not Set)
