openapi: 3.0.3

info:
  title: SME Cloud-Native Microservices API - Topic 10
  version: 1.0.0
  description: API contract for gateway routing, authorization enforcement, security testing, and API fuzzing.

servers:
  - url: https://localhost:8443
    description: Kong API Gateway HTTPS endpoint
  - url: http://localhost:8000
    description: Kong API Gateway HTTP endpoint for local testing

tags:
  - name: Users
    description: User service endpoints maintained by TV2
  - name: Orders
    description: Order service endpoints maintained by TV2
  - name: Billing
    description: Billing service endpoints maintained by TV3
  - name: Admin
    description: Admin service endpoints maintained by TV3
  - name: Webhooks
    description: Webhook callback endpoints protected by HMAC signature

paths:
  /api/v1/users/health:
    get:
      tags:
        - Users
      operationId: usersHealthCheck
      summary: Healthcheck for User API
      responses:
        '200':
          description: User service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/users/me:
    get:
      tags:
        - Users
      operationId: getCurrentUserProfile
      summary: Get current authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/orders/health:
    get:
      tags:
        - Orders
      operationId: ordersHealthCheck
      summary: Healthcheck for Order API
      responses:
        '200':
          description: Order service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/orders/{order_id}/vulnerable:
    get:
      tags:
        - Orders
      operationId: getOrderByIdVulnerable
      summary: Get order detail through intentionally vulnerable BOLA endpoint
      description: This endpoint intentionally omits ownership enforcement to demonstrate Broken Object Level Authorization in a controlled lab scenario. It must not be treated as the protected production endpoint.
      security:
        - bearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          description: Order identifier
          schema:
            type: string
          example: "ord-bob-2001"
      responses:
        '200':
          description: Order detail is returned for BOLA demonstration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/{order_id}/fixed:
    get:
      tags:
        - Orders
      operationId: getOrderByIdFixed
      summary: Get order detail through ownership-protected endpoint
      description: This endpoint enforces server-side ownership or admin authorization and is the mitigation endpoint for the BOLA scenario.
      security:
        - bearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          description: Order identifier
          schema:
            type: string
          example: "ord-alice-1001"
      responses:
        '200':
          description: Order detail is returned when the caller is authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/internal/verify-ownership:
    post:
      tags:
        - Orders
      operationId: verifyOrderOwnershipInternal
      summary: Verify order ownership for internal Billing service calls
      description: Internal service-to-service endpoint. Requires a valid Client Credentials access token for `billing-service-client` with role `order-ownership-read`. Human user tokens and other service clients are rejected.
      security:
        - bearerAuth: []
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          description: Correlation identifier propagated from Billing to Order.
          schema:
            type: string
          example: "req-123456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnershipVerificationRequest'
      responses:
        '200':
          description: Ownership verification completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnershipVerificationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/billing/health:
    get:
      tags:
        - Billing
      operationId: billingHealthCheck
      summary: Healthcheck for Billing API
      responses:
        '200':
          description: Billing service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/billing/checkout:
    post:
      tags:
        - Billing
      operationId: createCheckoutSession
      summary: Create a checkout request and trigger payment processing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '202':
          description: Checkout request accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/health:
    get:
      tags:
        - Admin
      operationId: adminHealthCheck
      summary: Healthcheck for Admin API
      responses:
        '200':
          description: Admin service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/admin/maintenance:
    post:
      tags:
        - Admin
      operationId: runMaintenanceFetch
      summary: Execute maintenance fetch operation
      description: This endpoint is used to demonstrate SSRF behavior in the vulnerable version and URL allowlist/blocklist enforcement in the fixed version.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceFetchRequest'
      responses:
        '200':
          description: Maintenance fetch executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceFetchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Request blocked by SSRF protection policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/webhooks/payment:
    post:
      tags:
        - Webhooks
      operationId: receivePaymentWebhook
      summary: Receive signed payment webhook callback
      parameters:
        - name: X-Webhook-Timestamp
          in: header
          required: true
          schema:
            type: string
          example: "1718272800"
        - name: X-Webhook-Nonce
          in: header
          required: true
          schema:
            type: string
          example: "nonce-123456"
        - name: X-Webhook-Signature
          in: header
          required: true
          schema:
            type: string
          example: "sha256=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookRequest'
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcceptedResponse'
        '401':
          description: Missing or invalid HMAC signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Expired timestamp or replayed nonce
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing, expired, or invalid JWT. Token revocation is demonstrated through Keycloak introspection/revocation scripts, not backend online revocation enforcement.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Authenticated principal does not have permission to access this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Request body failed schema validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: "ok"
        service:
          type: string
          example: "user-service"

    UserProfile:
      type: object
      required:
        - user_id
        - username
        - roles
      properties:
        user_id:
          type: string
          example: "alice"
        username:
          type: string
          example: "alice"
        email:
          type: string
          format: email
          example: "alice@example.local"
        roles:
          type: array
          items:
            type: string
          example:
            - user

    OrderDetail:
      type: object
      required:
        - order_id
        - owner_id
        - amount
        - status
      properties:
        order_id:
          type: string
          example: "order-001"
        owner_id:
          type: string
          example: "alice"
        amount:
          type: number
          format: float
          example: 150000
        status:
          type: string
          example: "created"

    CheckoutRequest:
      type: object
      required:
        - order_id
        - amount
      properties:
        order_id:
          type: string
          example: "order-001"
        amount:
          type: number
          format: float
          example: 150000
        currency:
          type: string
          example: "VND"

    OwnershipVerificationRequest:
      type: object
      required:
        - order_id
        - subject
      properties:
        order_id:
          type: string
          example: "ord-alice-1001"
        subject:
          type: string
          example: "alice"

    OwnershipVerificationResponse:
      type: object
      required:
        - order_id
        - allowed
      properties:
        order_id:
          type: string
          example: "ord-alice-1001"
        allowed:
          type: boolean
          example: true
        correlation_id:
          type: string
          example: "req-123456"

    CheckoutAcceptedResponse:
      type: object
      required:
        - checkout_id
        - status
      properties:
        checkout_id:
          type: string
          example: "checkout-001"
        status:
          type: string
          example: "accepted"

    MaintenanceFetchRequest:
      type: object
      required:
        - fetch_url
      properties:
        fetch_url:
          type: string
          format: uri
          example: "http://169.254.169.254/latest/meta-data/"
          description: URL used for SSRF simulation and protection testing.

    MaintenanceFetchResponse:
      type: object
      properties:
        fetched:
          type: boolean
          example: true
        target:
          type: string
          example: "http://169.254.169.254/latest/meta-data/"
        result:
          type: string
          example: "metadata response"

    PaymentWebhookRequest:
      type: object
      required:
        - event_id
        - event_type
        - checkout_id
      properties:
        event_id:
          type: string
          example: "evt-001"
        event_type:
          type: string
          example: "payment.succeeded"
        checkout_id:
          type: string
          example: "checkout-001"
        amount:
          type: number
          format: float
          example: 150000

    WebhookAcceptedResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "accepted"

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: "forbidden"
        message:
          type: string
          example: "Access denied"
        correlation_id:
          type: string
          example: "req-123456"
