openapi: 3.0.3

info:
  title: SME Cloud-Native Microservices API - Topic 10
  version: 1.0.0
  description: API contract for gateway routing, authorization enforcement, configurable backend token introspection on high-risk endpoints, structured auth-failure logging, security testing, and API fuzzing.

servers:
  - url: https://localhost:8443
    description: Kong API Gateway HTTPS endpoint
  - url: http://localhost:8000
    description: Kong API Gateway HTTP endpoint for local testing

tags:
  - name: Users
    description: User service endpoints maintained by TV2
  - name: Orders
    description: Order service endpoints maintained by TV2
  - name: Billing
    description: Billing service endpoints maintained by TV3
  - name: Admin
    description: Admin service endpoints maintained by TV3
  - name: Webhooks
    description: Webhook callback endpoints protected by HMAC signature

paths:
  /api/v1/users/health:
    get:
      tags:
        - Users
      operationId: usersHealthCheck
      summary: Healthcheck for User API
      responses:
        '200':
          description: User service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/users/me:
    get:
      tags:
        - Users
      operationId: getCurrentUserProfile
      summary: Get current authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/profile:
    get:
      tags:
        - Users
      operationId: getCurrentUserProfileDetail
      summary: Get current authenticated user profile details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/orders/health:
    get:
      tags:
        - Orders
      operationId: ordersHealthCheck
      summary: Healthcheck for Order API
      responses:
        '200':
          description: Order service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/orders:
    get:
      tags:
        - Orders
      operationId: listOrders
      summary: List orders visible to the authenticated caller
      description: Users receive their own orders; admins receive all demo orders.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders visible to the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/orders/{order_id}:
    get:
      tags:
        - Orders
      operationId: getOrderById
      summary: Get order detail through the ownership-protected endpoint
      description: Returns the order only when the caller owns it or has the admin role.
      security:
        - bearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          description: Order identifier
          schema:
            type: string
          example: "ord-alice-1001"
      responses:
        '200':
          description: Order detail is returned when the caller is authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/{order_id}/vulnerable:
    get:
      tags:
        - Orders
      operationId: getOrderByIdVulnerable
      summary: Get order detail through intentionally vulnerable BOLA endpoint
      description: This endpoint intentionally omits ownership enforcement to demonstrate Broken Object Level Authorization in a controlled lab scenario. It must not be treated as the protected production endpoint.
      security:
        - bearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          description: Order identifier
          schema:
            type: string
          example: "ord-bob-2001"
      responses:
        '200':
          description: Order detail is returned for BOLA demonstration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/{order_id}/fixed:
    get:
      tags:
        - Orders
      operationId: getOrderByIdFixed
      summary: Get order detail through ownership-protected endpoint
      description: This endpoint enforces server-side ownership or admin authorization and is the mitigation endpoint for the BOLA scenario.
      security:
        - bearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          description: Order identifier
          schema:
            type: string
          example: "ord-alice-1001"
      responses:
        '200':
          description: Order detail is returned when the caller is authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/internal/verify-ownership:
    post:
      tags:
        - Orders
      operationId: verifyOrderOwnershipInternal
      summary: Verify order ownership for internal Billing service calls
      description: Internal service-to-service endpoint. Requires a valid Client Credentials access token for `billing-service-client` with role `order-ownership-read`. Human user tokens and other service clients are rejected. The backend validates the JWT signature and issuer first. When `TOKEN_INTROSPECTION_ENABLED=true`, the backend then calls Keycloak token introspection and rejects inactive tokens or introspection failures with 401.
      security:
        - bearerAuth: []
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          description: Correlation identifier propagated from Billing to Order.
          schema:
            type: string
          example: "req-123456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnershipVerificationRequest'
      responses:
        '200':
          description: Ownership verification completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnershipVerificationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/billing/health:
    get:
      tags:
        - Billing
      operationId: billingHealthCheck
      summary: Healthcheck for Billing API
      responses:
        '200':
          description: Billing service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/billing/checkout:
    post:
      tags:
        - Billing
      operationId: createCheckoutSession
      summary: Create a checkout request and trigger payment processing
      description: Requires a valid user/admin JWT and verifies order ownership through the Order service before accepting checkout. The backend validates the JWT signature and issuer first. When `TOKEN_INTROSPECTION_ENABLED=true`, the backend then calls Keycloak token introspection and rejects inactive tokens or introspection failures with 401.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '202':
          description: Checkout request accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/health:
    get:
      tags:
        - Admin
      operationId: adminHealthCheck
      summary: Healthcheck for Admin API
      responses:
        '200':
          description: Admin service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/admin/maintenance:
    post:
      tags:
        - Admin
      operationId: runMaintenance
      summary: Execute an admin maintenance action
      description: Requires a valid Client Credentials access token for `admin-service-client` with role `admin-maintenance`. Human users and other service clients are rejected. The backend validates the JWT signature and issuer first. When `TOKEN_INTROSPECTION_ENABLED=true`, the backend then calls Keycloak token introspection and rejects inactive tokens or introspection failures with 401.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '200':
          description: Maintenance action executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/metadata-fetch/vulnerable:
    post:
      tags:
        - Admin
        - SSRF
      operationId: metadataFetchVulnerable
      summary: Execute the intentionally vulnerable metadata fetch endpoint
      description: Intentionally fetches the requested URL without SSRF validation for controlled lab evidence. Requires a valid admin bearer token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceFetchRequest'
      responses:
        '200':
          description: Metadata fetch attempt completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceFetchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/admin/metadata-fetch/fixed:
    post:
      tags:
        - Admin
        - SSRF
      operationId: metadataFetchFixed
      summary: Execute the SSRF-protected metadata fetch endpoint
      description: Validates the requested URL before fetching and blocks metadata, loopback, private, and dangerous targets. Requires a valid admin bearer token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceFetchRequest'
      responses:
        '200':
          description: Metadata fetch attempt completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceFetchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/webhooks/payment:
    post:
      tags:
        - Webhooks
      operationId: receivePaymentWebhook
      summary: Receive signed payment webhook callback
      parameters:
        - name: X-Webhook-Timestamp
          in: header
          required: true
          schema:
            type: string
          example: "1718272800"
        - name: X-Webhook-Nonce
          in: header
          required: true
          schema:
            type: string
          example: "nonce-123456"
        - name: X-Webhook-Signature
          in: header
          required: true
          schema:
            type: string
          example: "sha256=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookRequest'
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcceptedResponse'
        '401':
          description: Missing or invalid HMAC signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Expired timestamp or replayed nonce
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing, expired, inactive, or invalid JWT. Protected services emit a structured `auth_failure` JSON log with `correlation_id` and a safe `reason`/`category`. Billing checkout, Order internal verify-ownership, and Admin maintenance perform offline JWT signature/issuer validation first, then configurable Keycloak token introspection when `TOKEN_INTROSPECTION_ENABLED=true`; inactive tokens and introspection failures fail closed with 401.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Authenticated principal does not have permission to access this resource. Protected services emit a structured `auth_failure` JSON log with `correlation_id` and a safe `reason`/`category`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Request body failed schema validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: "ok"
        service:
          type: string
          example: "user-service"

    UserMeResponse:
      type: object
      required:
        - user_id
        - username
        - email
        - roles
        - correlation_id
      properties:
        user_id:
          type: string
          example: "alice"
        username:
          type: string
          example: "alice"
        email:
          type: string
          format: email
          example: "alice@example.local"
        roles:
          type: array
          items:
            type: string
          example:
            - user
        correlation_id:
          type: string
          example: "req-123456"

    UserProfileResponse:
      allOf:
        - $ref: '#/components/schemas/UserMeResponse'
        - type: object
          required:
            - azp
            - scope
          properties:
            azp:
              type: string
              example: "topic10-api"
            scope:
              type: string
              example: "openid profile email"

    OrderSummary:
      type: object
      required:
        - order_id
        - owner_id
        - amount
        - status
        - currency
      properties:
        order_id:
          type: string
          example: "ord-alice-1001"
        owner_id:
          type: string
          example: "alice"
        amount:
          type: number
          format: float
          example: 150000
        status:
          type: string
          example: "created"
        currency:
          type: string
          example: "VND"

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          required:
            - correlation_id
          properties:
            note:
              type: string
              example: "BOLA FIXED: ownership verified"
            correlation_id:
              type: string
              example: "req-123456"

    OrderListResponse:
      type: object
      required:
        - caller
        - orders
        - count
        - correlation_id
      properties:
        caller:
          type: string
          example: "alice"
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        count:
          type: integer
          example: 2
        correlation_id:
          type: string
          example: "req-123456"

    CheckoutRequest:
      type: object
      required:
        - order_id
        - amount
      properties:
        order_id:
          type: string
          example: "ord-alice-1001"
        amount:
          type: number
          format: float
          example: 150000
        currency:
          type: string
          example: "VND"

    OwnershipVerificationRequest:
      type: object
      required:
        - order_id
        - subject
      properties:
        order_id:
          type: string
          example: "ord-alice-1001"
        subject:
          type: string
          example: "alice"

    OwnershipVerificationResponse:
      type: object
      required:
        - order_id
        - allowed
        - correlation_id
      properties:
        order_id:
          type: string
          example: "ord-alice-1001"
        allowed:
          type: boolean
          example: true
        correlation_id:
          type: string
          example: "req-123456"

    CheckoutAcceptedResponse:
      type: object
      required:
        - payment_id
        - order_id
        - status
        - amount
        - currency
        - correlation_id
      properties:
        payment_id:
          type: string
          example: "pay-1a2b3c4d"
        order_id:
          type: string
          example: "ord-alice-1001"
        status:
          type: string
          example: "accepted"
        amount:
          type: number
          format: float
          example: 150000
        currency:
          type: string
          example: "VND"
        correlation_id:
          type: string
          example: "req-123456"

    MaintenanceRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          example: "health-check"

    MaintenanceResponse:
      type: object
      required:
        - status
        - action
        - correlation_id
      properties:
        status:
          type: string
          example: "executed"
        action:
          type: string
          example: "health-check"
        correlation_id:
          type: string
          example: "req-123456"

    MaintenanceFetchRequest:
      type: object
      required:
        - fetch_url
      properties:
        fetch_url:
          type: string
          format: uri
          example: "http://169.254.169.254/latest/meta-data/"
          description: URL used for SSRF simulation and protection testing.

    MaintenanceFetchResponse:
      type: object
      properties:
        fetched:
          type: boolean
          example: true
        target:
          type: string
          example: "http://169.254.169.254/latest/meta-data/"
        result:
          type: string
          example: "metadata response"

    PaymentWebhookRequest:
      type: object
      required:
        - event_id
        - event_type
        - checkout_id
      properties:
        event_id:
          type: string
          example: "evt-001"
        event_type:
          type: string
          example: "payment.succeeded"
        checkout_id:
          type: string
          example: "checkout-001"
        amount:
          type: number
          format: float
          example: 150000

    WebhookAcceptedResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "accepted"

    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          oneOf:
            - $ref: '#/components/schemas/ErrorDetail'
            - type: string
              example: "Not authenticated"
            - type: array
              items:
                type: object

    ErrorDetail:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: "forbidden"
        message:
          type: string
          example: "Access denied"
        event_type:
          type: string
          example: "bola_attempt"
